<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View details and reserve this handcrafted jewelry piece from Lilyhouse.">
  <title>Item Details - Lilyhouse Jewelry</title>
  <link rel="icon" type="image/x-icon" href="images/site/lilyhouse_favicon.ico">
  <link rel="apple-touch-icon" href="images/site/lilyhouse_apple_touch_icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">
          <img src="images/site/logo-no-bg.png" alt="Lilyhouse Jewelry">
          <div class="logo-text-container">
            <span class="logo-brand">Lilyhouse</span>
            <span class="logo-subtitle">Jewelry</span>
          </div>
        </a>
        <button class="mobile-menu-toggle" aria-label="Toggle menu">☰</button>
        <ul class="nav-links">
          <li><a href="index.html" data-translate="nav.home"></a></li>
          <li><a href="collection.html" data-translate="nav.collection"></a></li>
          <li><a href="about.html" data-translate="nav.about"></a></li>
          <li><a href="contact.html" data-translate="nav.contact"></a></li>
        </ul>
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn active" data-lang="lv">LV</button>
        </div>
      </nav>
    </div>
  </header>

  <!-- Item Detail Section -->
  <section class="item-detail">
    <div class="container">
      <!-- Item content will be dynamically loaded here -->
      <div class="text-center" style="padding: 4rem 0;">
        <p>Loading item details...</p>
      </div>
    </div>
  </section>

  <!-- Reservation Modal -->
  <div class="modal" id="reservationModal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close modal">&times;</button>
      <h2 data-translate="item.modal_title"></h2>
      <p style="margin-bottom: 2rem; color: var(--color-text-light);">
        Interested in <strong id="itemNameDisplay"></strong>? Fill out the form below and we'll get back to you soon.
      </p>
      
      <!-- 
        FORMSPREE INTEGRATION INSTRUCTIONS:
        1. Go to https://formspree.io/ and create a free account
        2. Create a new form and get your form endpoint URL
        3. Replace YOUR_FORM_ID below with your actual Formspree form ID
        4. The action URL should look like: https://formspree.io/f/YOUR_FORM_ID
        
        Example: <form action="https://formspree.io/f/xpznkjwb" method="POST" data-form-type="reservation">
      -->
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" data-form-type="reservation">
        <!-- Hidden field to include item name in submission -->
        <input type="hidden" name="item" id="itemName" value="">
        <!-- Hidden field to include selected color option -->
        <input type="hidden" name="item_color" id="itemColor" value="">
        <!-- Hidden field to include selected material option -->
        <input type="hidden" name="item_material" id="itemMaterial" value="">
        
        <!-- Formspree honeypot field to reduce spam -->
        <input type="text" name="_gotcha" style="display:none">
        
        <div class="form-group">
          <label for="customerName">Your Name *</label>
          <input type="text" id="customerName" name="name" required>
        </div>
        
        <div class="form-group">
          <label for="customerEmail">Your Email *</label>
          <input type="email" id="customerEmail" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="customerMessage">Message (optional)</label>
          <textarea id="customerMessage" name="message" placeholder="Any questions or special requests?"></textarea>
        </div>
        
        <button type="submit" class="btn">Send Reservation Request</button>
        
        <!-- Success message (Formspree will redirect or show this) -->
        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--color-text-light);">
          We'll respond to your reservation request within 24 hours.
        </p>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h3>Lilyhouse</h3>
          <p data-translate="footer.about"></p>
        </div>
        
        <div class="footer-section">
          <h3 data-translate="footer.links_title"></h3>
          <a href="collection.html" data-translate="nav.collection"></a>
          <a href="about.html" data-translate="nav.about"></a>
          <a href="contact.html" data-translate="nav.contact"></a>
        </div>
        
        <div class="footer-section">
          <h3 data-translate="footer.contact_title"></h3>
          <p><span data-translate="footer.email_label"></span> hello@lilyhouse.lv</p>
          <div class="social-links" style="justify-content: flex-start; margin-top: 1rem;">

          </div>
        </div>
      </div>
      
      <div class="footer-bottom">
        <p data-translate="footer.copyright"></p>
      </div>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="js/main.js"></script>
</body>
</html>
